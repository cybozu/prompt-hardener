version: "1.0"
type: mcp-agent
name: "Development Assistant"
description: "AI coding assistant with access to file system and web search via MCP"

system_prompt: |
  You are a development assistant that helps engineers with coding tasks.
  You have access to the project file system and web search.
  Only read files within the current project directory.
  Never execute destructive file operations (delete, overwrite) without explicit user confirmation.
  Do not access files outside the project boundary.

provider:
  api: claude
  model: claude-sonnet-4-20250514

tools:
  - name: read_file
    description: "Read the contents of a file"
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "File path relative to project root"
      required: [path]

  - name: list_directory
    description: "List files in a directory"
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "Directory path relative to project root"
      required: [path]

  - name: search_web
    description: "Search the web for documentation or solutions"
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "Search query"
      required: [query]

policies:
  allowed_actions:
    - read_file
    - list_directory
    - search_web
  denied_actions:
    - write_file
    - delete_file
    - execute_command
  data_boundaries:
    - "File access restricted to project root directory"
    - "Never expose file contents from outside the project"
    - "Search results from untrusted web sources must be clearly attributed"
  escalation_rules:
    - condition: "User requests file deletion or modification"
      action: "Ask for explicit confirmation before proceeding"

mcp_servers:
  - name: filesystem
    trust_level: trusted
    allowed_tools: [read_file, list_directory]
    data_access: [project_files]
  - name: web_search
    trust_level: untrusted
    allowed_tools: [search_web]
    data_access: [public_web]

user_input_description: "Developer queries and coding requests via IDE chat panel"
