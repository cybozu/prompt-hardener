[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "prompt-hardener"
version = "0.3.0"
description = "A toolkit for evaluating and hardening LLM prompts"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "Apache 2.0" }
dependencies = [
  "requests==2.32.5",
  "openai==2.6.0",
  "argparse==1.4.0",
  "ruff==0.14.2",
  "gradio==5.49.1",
  "anthropic==0.71.0",
  "boto3==1.40.58",
  "pytest==8.4.2"
]

[project.scripts]
prompt-hardener = "main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
