[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "prompt-hardener"
version = "0.4.0"
description = "Automated Evaluation and Hardening of LLM System Prompts"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "Apache 2.0" }
dependencies = [
  "requests==2.32.5",
  "openai==2.14.0",
  "argparse==1.4.0",
  "ruff==0.15.1",
  "gradio==6.2.0",
  "anthropic==0.75.0",
  "boto3==1.42.50",
  "pytest==9.0.2"
]

[project.scripts]
prompt-hardener = "prompt_hardener.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
