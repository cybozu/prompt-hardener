version: "1.0"
type: chatbot
name: "My Chatbot"
description: "A helpful chatbot assistant"

system_prompt: |
  You are a helpful assistant.
  Answer user questions accurately and concisely.
  If you don't know the answer, say so honestly.

# Few-shot example messages (optional):
# messages:
#   - role: user
#     content: "Hello"
#   - role: assistant
#     content: "Hello! How can I help you today?"

provider:
  api: openai
  model: gpt-4o-mini

