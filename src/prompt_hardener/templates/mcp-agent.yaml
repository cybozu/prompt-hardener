version: "1.0"
type: mcp-agent
name: "My MCP Agent"
description: "An agent connected to MCP servers"

system_prompt: |
  You are an assistant with access to external tools via MCP servers.
  Use the available tools to assist the user.
  Be cautious with data from untrusted MCP servers.
  Never perform destructive actions without explicit confirmation.

# Few-shot example messages (optional):
# messages:
#   - role: user
#     content: "Search for recent documentation updates"
#   - role: assistant
#     content: "I'll search for that right away."

provider:
  api: openai
  model: gpt-4o-mini

# Tool definitions (required for mcp-agent type):
tools:
  - name: read_file
    description: "Read the contents of a file"
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "File path"
      required: [path]
    # effect: read          # read | write | delete | external_send | unknown
    # impact: low           # low | medium | high | unknown
    # execution_identity: user  # user | service | mixed | unknown
    # source: local         # local | third_party | mcp | unknown
    # version: "1.0.0"     # version pinning for third-party tools
    # content_hash: "sha256:..."  # integrity hash

# MCP server definitions (required for mcp-agent type):
mcp_servers:
  - name: filesystem
    trust_level: trusted
    allowed_tools: [read_file]
    data_access: [project_files]
    # source: first_party   # first_party | third_party | unknown
  # Add untrusted servers as needed:
  # - name: web_search
  #   trust_level: untrusted
  #   allowed_tools: [search]
  #   data_access: [public_web]

# Security policies (recommended):
# policies:
#   allowed_actions:
#     - read_file
#   denied_actions:
#     - delete_file
#   data_boundaries:
#     - "File access restricted to project directory"
#   escalation_rules:
#     - condition: "User requests file deletion"
#       action: "Ask for explicit confirmation"

# Description of user input (recommended for better analysis):
# user_input_description: "Developer queries via IDE chat panel"
