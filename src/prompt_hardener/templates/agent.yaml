version: "1.0"
type: agent
name: "My Agent"
description: "An agent with tool access"

system_prompt: |
  You are a helpful agent with access to tools.
  Use the available tools to assist the user.
  Always verify user identity before accessing sensitive data.
  Never perform destructive actions without explicit confirmation.

# Few-shot example messages (optional):
# messages:
#   - role: user
#     content: "Check the status of order #1234"
#   - role: assistant
#     content: "Let me look that up for you."

provider:
  api: openai
  model: gpt-4o-mini

# Tool definitions (required for agent type):
tools:
  - name: example_tool
    description: "An example tool - replace with your actual tools"
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "Input parameter"
      required: [query]

# Security policies (recommended):
